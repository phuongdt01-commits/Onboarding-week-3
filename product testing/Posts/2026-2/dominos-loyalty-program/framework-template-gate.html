<!-- EMAIL GATE: 3-Stage Loyalty Framework Template -->
<!-- Paste into a Ghost HTML card at the desired position in the article -->
<!-- Before publishing: replace YOUR_HOSTED_PDF_URL_HERE with the live PDF URL -->

<div>
  <div class="email-box">
    <div class="email-box__title">
      <img src="https://cdn-web.joy.so/cdn/image/2025/08/image-358c3d.png" width="24" height="24" alt="icon">
      Free 3-Stage Loyalty Framework Template
    </div>
    <p class="email-box__desc">
      Fill-in template to configure earn rules, behavioral triggers, and tiers for your Shopify store.
    </p>
    <div class="email-box__features">
      <div class="email-box__feature">
        <img src="https://cdn-web.joy.so/cdn/image/2025/08/check-circle-svgrepo-com-(1)-d95014.svg" width="20" height="20" alt="check">
        Earn floor calculator
      </div>
      <div class="email-box__feature">
        <img src="https://cdn-web.joy.so/cdn/image/2025/08/check-circle-svgrepo-com-(1)-d95014.svg" width="20" height="20" alt="check">
        Behavioral trigger planner
      </div>
      <div class="email-box__feature">
        <img src="https://cdn-web.joy.so/cdn/image/2025/08/check-circle-svgrepo-com-(1)-d95014.svg" width="20" height="20" alt="check">
        Tier and status builder
      </div>
    </div>
    <div class="email-box__form">
      <input type="email" placeholder="Enter your email" class="email-box__input" required>
      <button type="button" class="email-box__btn">Get the template</button>
    </div>
    <p class="email-box__trust">No spam. Unsubscribe any time.</p>
  </div>
  <style>
    .email-box {
      background: #fff;
      border-radius: 16px;
      padding: 24px 32px;
      box-shadow: 0 8px 24px rgba(6,3,141,0.08);
      border: 1px solid rgba(6,3,141,0.1);
      max-width: 640px;
      margin: 32px auto;
    }
    .email-box__title {
      display: flex;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      color: #06038D;
      gap: 8px;
      margin-bottom: 8px;
    }
    .email-box__title img,
    .email-box__feature img {
      width: 24px !important;
      height: 24px !important;
    }
    .email-box__desc {
      font-size: 15px;
      color: rgba(6,3,141,0.7);
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .email-box__features {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 14px;
      color: #06038D;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .email-box__feature {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .email-box__form {
      display: flex;
      gap: 10px;
    }
    .email-box__input {
      flex: 1;
      padding: 12px 14px;
      font-size: 15px;
      border: 1.5px solid rgba(6,3,141,0.15);
      border-radius: 8px;
      color: #06038D;
      transition: border-color 0.2s ease;
    }
    .email-box__input:focus {
      outline: none;
      border-color: #00BCE1;
      box-shadow: 0 0 0 3px rgba(0,188,225,0.12);
    }
    .email-box__input:invalid {
      border-color: #ef4444;
    }
    .email-box__btn {
      white-space: nowrap;
      background: #06038D;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 22px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 12px rgba(6,3,141,0.25);
    }
    .email-box__btn:hover {
      background: #0805b8;
      box-shadow: 0 6px 18px rgba(6,3,141,0.35);
    }
    .email-box__trust {
      font-size: 12px;
      color: rgba(6,3,141,0.38);
      margin-top: 10px;
      margin-bottom: 0;
    }
  </style>
  <script>
    (function () {
      var scriptURL = 'https://script.google.com/macros/s/AKfycbxPXcDqQ4twlqIgpYuiACt7n3TOnfmVRj_rINhKfSQKxzIZ0OSC8AfMyx_qlTGIX3E/exec';
      var downloadURL = 'YOUR_HOSTED_PDF_URL_HERE';
      document.querySelector('.email-box__btn').addEventListener('click', function () {
        var input = document.querySelector('.email-box__input');
        var email = input.value.trim();
        var button = this;
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email) { alert('Please enter your email.'); input.focus(); return; }
        if (!emailRegex.test(email)) { alert('Please enter a valid email address (e.g., you@example.com)'); input.focus(); return; }
        button.disabled = true;
        button.textContent = 'Sending...';
        button.style.opacity = '0.7';
        fetch(scriptURL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, url: window.location.href, source: 'dominos-framework-template' })
        }).finally(function () {
          input.value = '';
          button.disabled = false;
          button.textContent = 'Get the template';
          button.style.opacity = '1';
          window.open(downloadURL, '_blank');
        });
      });
    })();
  </script>
</div>
