<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: {{BACKGROUND_PNG}};
      background-size: 100% 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      gap: 40px;
      overflow: hidden;
    }
  </style>
</head>
<body>

  <!-- Headline -->
  <h1 style="color: #06038D; font-size: 56px; font-weight: 700; text-align: center;">
    The Engagement Gap
  </h1>

  <!-- Bar Chart - Scaled Up -->
  <div style="display: flex; align-items: flex-end; gap: 80px; width: 100%; height: 340px; justify-content: center;">

    <!-- Bar 1: 67% -->
    <div style="flex: 0 0 240px; display: flex; flex-direction: column; align-items: center; gap: 16px; height: 100%; justify-content: flex-end;">
      <div style="color: #06038D; font-size: 72px; font-weight: 700; line-height: 1;">67%</div>
      <div style="width: 100%; height: 70%; background: #06038D; border-radius: 20px 20px 0 0;"></div>
      <div style="color: #06038D; font-size: 32px; font-weight: 700; text-align: center; max-width: 240px; line-height: 1.3;">Belong to<br>loyalty programs</div>
    </div>

    <!-- Gap Indicator -->
    <div style="flex: 0 0 100px; display: flex; flex-direction: column; align-items: center; gap: 20px; height: 100%; justify-content: center;">
      <svg width="80" height="140" viewBox="0 0 80 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M40 20V110" stroke="#FF6D6A" stroke-width="5" stroke-linecap="round"/>
        <path d="M20 95l20 20 20-20" stroke="#FF6D6A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div style="color: #FF6D6A; font-size: 18px; font-weight: 700; text-align: center;">GAP</div>
    </div>

    <!-- Bar 2: 24% -->
    <div style="flex: 0 0 240px; display: flex; flex-direction: column; align-items: center; gap: 16px; height: 100%; justify-content: flex-end;">
      <div style="color: #00BCE1; font-size: 72px; font-weight: 700; line-height: 1;">24%</div>
      <div style="width: 100%; height: 28%; background: #00BCE1; border-radius: 20px 20px 0 0;"></div>
      <div style="color: #00BCE1; font-size: 32px; font-weight: 700; text-align: center; max-width: 240px; line-height: 1.3;">Actively<br>engage</div>
    </div>

  </div>

  <!-- Source -->
  <div style="color: #00BCE1; font-size: 18px; font-weight: 400; text-align: center;">
    Source: Loyalty insights research
  </div>

</body>
</html>
