<!DOCTYPE html>
<html style="zoom: calc({{WIDTH}} / 1526); width: 1526px;">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      background-image: url('{{BACKGROUND_PNG}}');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 60px;
      align-items: center;
      width: 100%;
      max-width: 1000px;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .stat-number {
      font-size: 96px;
      font-weight: 700;
      color: #00BCE1;
      line-height: 1;
    }
    .stat-label {
      font-size: 22px;
      font-weight: 600;
      color: #06038D;
    }
    .divider {
      width: 2px;
      height: 240px;
      background: linear-gradient(180deg, rgba(252, 210, 153, 0) 0%, #FCD299 50%, rgba(252, 210, 153, 0) 100%);
    }
    .source {
      font-size: 12px;
      color: rgba(6, 3, 141, 0.65);
      margin-top: 20px;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="stat-card">
      <div class="stat-number">89%</div>
      <div class="stat-label">Strong Omnichannel<br>Retention</div>
    </div>

    <div class="divider"></div>

    <div class="stat-card" style="opacity: 0.75;">
      <div class="stat-number" style="color: #FF6D6A;">33%</div>
      <div class="stat-label">Weak Omnichannel<br>Retention</div>
    </div>
  </div>

  <div class="source">Source: Capital One Shopping, Omnichannel Statistics (2024)</div>
</body>
</html>
