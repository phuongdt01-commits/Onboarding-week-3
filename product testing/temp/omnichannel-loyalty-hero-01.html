<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body {
      width: 1526px; height: {{HEIGHT_BASE}}px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: {{BACKGROUND_PNG}};
      background-size: 100% 100%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 80px;
      gap: 24px;
      overflow: hidden;
    }
    .headline { color: #06038D; font-size: 84px; font-weight: 700; line-height: 1.15; max-width: 1350px; text-shadow: 0 0 1px rgba(6,3,141,0.4); }
    .divider { width: 100px; height: 9px; background: #FCD299; border-radius: 4px 20px 20px 4px; margin: 12px 0; }
    .subtext { color: #00BCE1; font-size: 28px; font-weight: 500; max-width: 900px; }
  </style>
</head>
<body>
  <svg width="56" height="56" viewBox="0 0 48 48" fill="none">
    <rect width="48" height="48" rx="14" fill="#00BCE1"/>
    <circle cx="16" cy="20" r="4" fill="#FFF"/>
    <circle cx="32" cy="20" r="4" fill="#FFF"/>
    <path d="M14 28c2 2 6 3 10 3s8-1 10-3" stroke="#FFF" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div class="headline">Omnichannel Loyalty<br>Programs</div>
  <div class="divider"></div>
  <div class="subtext">Why brands with unified loyalty across all channels dominate retention.</div>
</body>
</html>
