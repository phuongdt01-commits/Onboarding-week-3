<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: {{BACKGROUND_PNG}};
      background-size: 100% 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 70px;
      gap: 28px;
      overflow: hidden;
    }
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .overline {
      color: #00BCE1;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .headline {
      color: #06038D;
      font-size: 40px;
      font-weight: 700;
      line-height: 1.15;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      width: 100%;
    }
    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(6, 3, 141, 0.08);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
    }
    .card-icon { margin-bottom: 2px; }
    .card-title {
      color: #06038D;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.25;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="overline">Implementation Strategy</div>
    <div class="headline">9 Ways to Build Value-Based Loyalty</div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M24 14v20M14 24h20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Reward Non-Transactional</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M24 16C20 16 17 19 17 23s3 7 7 7 7-3 7-7-3-7-7-7z" stroke="#FFFFFF" stroke-width="1.5"/>
          <path d="M24 20v6M21 23h6" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Align With Brand Values</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M18 20h12v12H18z" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M22 26h4M22 30h6" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Create Tiered Experiences</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M20 18h8v20h-8z" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M26 24h4" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Maintain Simplicity</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <circle cx="18" cy="22" r="3.5" stroke="#FFFFFF" stroke-width="1.5"/>
          <circle cx="30" cy="22" r="3.5" stroke="#FFFFFF" stroke-width="1.5"/>
          <path d="M18 26l12 8M30 26l-12 8" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Personalize Behavior</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M24 14C18.5 14 14 18.5 14 24s4.5 10 10 10 10-4.5 10-10-4.5-10-10-10z" stroke="#FFFFFF" stroke-width="1.5"/>
          <path d="M24 19l2.5 5.5h6l-4.5 3.5 1.5 5.5-6-4.5-6 4.5 1.5-5.5-4.5-3.5h6z" stroke="#FFFFFF" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-title">Offer Charitable Donations</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M14 28h20M18 24l-4 4 4 4M30 24l4 4-4 4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 16h20" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Build Omnichannel</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M16 20h16v12H16z" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M20 24h8M20 28h8" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-title">Track Relationship Health</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="22" height="22" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M22 18h4v20h-4zM28 22h4v16h-4z" stroke="#FFFFFF" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M32 24l-8-8-8 8" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-title">Start Simple, Iterate</div>
    </div>

  </div>

</body>
</html>
