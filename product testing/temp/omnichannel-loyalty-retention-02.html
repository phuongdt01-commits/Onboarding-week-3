<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body { width: 1526px; height: {{HEIGHT_BASE}}px; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-image: {{BACKGROUND_PNG}}; background-size: 100% 100%; display: flex; align-items: center; padding: 80px; gap: 80px; overflow: hidden; }
    .left { display: flex; flex-direction: column; gap: 12px; }
    .stat { color: #06038D; font-size: 140px; font-weight: 700; line-height: 1; letter-spacing: -3px; }
    .stat-label { color: #06038D; font-size: 36px; font-weight: 600; max-width: 400px; line-height: 1.2; }
    .right { flex: 1; display: flex; align-items: flex-end; gap: 24px; height: 280px; }
    .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 12px; height: 100%; justify-content: flex-end; }
    .bar-value { color: #06038D; font-size: 32px; font-weight: 700; }
    .bar-value.highlight { color: #00BCE1; }
    .bar { width: 100%; border-radius: 8px 8px 0 0; background: #06038D; }
    .bar.highlight { background: #00BCE1; }
    .bar-label { color: #06038D; font-size: 16px; font-weight: 600; text-align: center; }
    .source { color: #00BCE1; font-size: 18px; font-weight: 400; text-align: center; }
  </style>
</head>
<body>
  <div class="left">
    <div class="stat">89%</div>
    <div class="stat-label">Retention with Strong Omnichannel Strategy</div>
  </div>
  <div style="flex: 1;">
    <div class="right">
      <div class="bar-group">
        <div class="bar-value">33%</div>
        <div class="bar" style="height: 118px;"></div>
        <div class="bar-label">Without<br>Omnichannel</div>
      </div>
      <div class="bar-group">
        <div class="bar-value highlight">89%</div>
        <div class="bar highlight" style="height: 320px;"></div>
        <div class="bar-label">With<br>Omnichannel</div>
      </div>
    </div>
    <div class="source">Capital One Shopping Research</div>
  </div>
</body>
</html>
