<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: {{BACKGROUND_PNG}};
      background-size: 100% 100%;
      display: flex;
      align-items: stretch;
      padding: 60px 60px;
      gap: 40px;
      overflow: hidden;
    }
    .left { flex: 0 0 420px; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
    .badge { color: #06038D; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; }
    .headline-navy { color: #06038D; font-size: 44px; font-weight: 700; line-height: 1.1; }
    .headline-cerulean { color: #00BCE1; font-size: 52px; font-weight: 700; line-height: 1.05; }
    .subtext { color: rgba(6, 3, 141, 0.62); font-size: 18px; font-weight: 600; line-height: 1.5; max-width: 400px; }
    .right { flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .card { flex: 1; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.28); border-radius: 16px; padding: 20px 24px; display: flex; flex-direction: column; gap: 8px; justify-content: center; box-shadow: 0 4px 20px rgba(6, 3, 141, 0.08); }
    .card-icon { margin-bottom: 2px; }
    .card-label { color: #00BCE1; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .card-title { color: #06038D; font-size: 20px; font-weight: 700; line-height: 1.2; }
    .card-desc { color: rgba(6, 3, 141, 0.75); font-size: 14px; font-weight: 600; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="left">
    <div class="badge">Program Strategy</div>
    <div>
      <div class="headline-navy">Beyond</div>
      <div class="headline-cerulean">Transactional</div>
    </div>
    <div class="subtext">Value-aligned loyalty creates deeper customer relationships.</div>
  </div>

  <div class="right">
    <div class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#00BCE1"/>
          <path d="M14 20h20M14 28h20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-label">Traditional</div>
      <div class="card-title">Points-Only</div>
      <div class="card-desc">Interchangeable on rates</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#00BCE1"/>
          <path d="M24 14v20M14 24h20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-label">Value-Based</div>
      <div class="card-title">Multi-Action</div>
      <div class="card-desc">Rewards all behaviors</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#00BCE1"/>
          <circle cx="24" cy="24" r="7" stroke="#FFFFFF" stroke-width="2"/>
          <path d="M24 20v8M20 24h8" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-label">Data Rich</div>
      <div class="card-title">Deep Insights</div>
      <div class="card-desc">Why customers engage</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="12" fill="#00BCE1"/>
          <path d="M18 30L24 20L30 30M14 34h20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="card-label">Connection</div>
      <div class="card-title">Build Trust</div>
      <div class="card-desc">Authentic values win</div>
    </div>
  </div>

</body>
</html>
