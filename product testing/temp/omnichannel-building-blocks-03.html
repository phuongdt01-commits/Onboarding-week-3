<!DOCTYPE html>
<html style="zoom: calc({{WIDTH}} / 1526); width: 1526px;">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      background-image: url('{{BACKGROUND_PNG}}');
      background-size: 100% 100%;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .cards-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      width: 100%;
      max-width: 1100px;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 36px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(6, 3, 141, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #00BCE1;
    }
    .card-title {
      font-size: 28px;
      font-weight: 700;
      color: #06038D;
      line-height: 1.2;
    }
    .card-desc {
      font-size: 19px;
      font-weight: 600;
      color: rgba(6, 3, 141, 0.75);
      line-height: 1.4;
    }
    .connection-line {
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00BCE1, transparent);
      margin-bottom: 20px;
    }
    .subtitle {
      font-size: 18px;
      font-weight: 600;
      color: rgba(6, 3, 141, 0.65);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="connection-line"></div>

  <div class="cards-container">
    <div class="card">
      <div class="icon">🗄️</div>
      <div class="card-title">Unified Customer Profiles</div>
      <div class="card-desc">One profile. Real-time sync across all channels.</div>
    </div>

    <div class="card">
      <div class="icon">📱</div>
      <div class="card-title">Loyalty App + Integrations</div>
      <div class="card-desc">Native POS. Ecommerce + email synced together.</div>
    </div>

    <div class="card">
      <div class="icon">⚡</div>
      <div class="card-title">Cross-Channel Automation</div>
      <div class="card-desc">Points earned anywhere fire triggers everywhere.</div>
    </div>
  </div>

  <div class="connection-line"></div>

  <div class="subtitle">All three working together = omnichannel system</div>
</body>
</html>
