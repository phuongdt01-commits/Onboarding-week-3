<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body { width: 1526px; height: {{HEIGHT_BASE}}px; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-image: {{BACKGROUND_PNG}}; background-size: 100% 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 60px; gap: 32px; overflow: hidden; }
    .headline { color: #06038D; font-size: 44px; font-weight: 700; text-align: center; max-width: 900px; }
    .metrics { display: flex; gap: 32px; width: 100%; justify-content: center; align-items: stretch; }
    .card { background: rgba(6, 3, 141, 0.72); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; padding: 40px 36px; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; flex: 1; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
    .label { color: #00BCE1; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
    .title { color: #FFFFFF; font-size: 36px; font-weight: 700; line-height: 1.2; }
    .range { color: rgba(255, 255, 255, 0.75); font-size: 18px; font-weight: 500; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="headline">Key Metrics for Healthy Programs</div>
  <div class="metrics">
    <div class="card">
      <div class="label">Primary</div>
      <div class="title">Assisted<br>Orders</div>
      <div class="range">Loyalty-influenced purchases</div>
    </div>
    <div class="card">
      <div class="label">Engagement</div>
      <div class="title">35–45%</div>
      <div class="range">Active member rate</div>
    </div>
    <div class="card">
      <div class="label">Activation</div>
      <div class="title">20–35%</div>
      <div class="range">Redemption rate</div>
    </div>
  </div>
</body>
</html>
