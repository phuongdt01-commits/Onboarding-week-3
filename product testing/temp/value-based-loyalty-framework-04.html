<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: {{BACKGROUND_PNG}};
      background-size: 100% 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 80px;
      gap: 40px;
      overflow: hidden;
    }
    .header {
      text-align: center;
    }
    .overline {
      color: #00BCE1;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .headline {
      color: #06038D;
      font-size: 48px;
      font-weight: 700;
      line-height: 1.15;
    }
    .framework {
      position: relative;
      width: 100%;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .center-circle {
      position: absolute;
      width: 240px;
      height: 240px;
      background: rgba(6, 3, 141, 0.72);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
    }
    .center-label {
      color: #00BCE1;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .center-title {
      color: #FFFFFF;
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }
    .pillar {
      position: absolute;
      width: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .pillar-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(6, 3, 141, 0.08);
    }
    .pillar-text {
      color: #06038D;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
    }
    /* Positioning pillars around center */
    .p1 { top: 0; left: 50%; transform: translateX(-50%); }
    .p2 { top: 50px; right: 0; }
    .p3 { top: 150px; right: -20px; }
    .p4 { bottom: 0; right: 50px; }
    .p5 { bottom: 0; left: 50px; }
    .p6 { top: 150px; left: -20px; }
    .p7 { top: 50px; left: 0; }
  </style>
</head>
<body>

  <div class="header">
    <div class="overline">Program Definition</div>
    <div class="headline">What Makes a Program Value-Based?</div>
  </div>

  <div class="framework">
    
    <!-- Center Circle -->
    <div class="center-circle">
      <div class="center-label">Core</div>
      <div class="center-title">Value-Based Loyalty</div>
    </div>

    <!-- Pillar 1: Top -->
    <div class="pillar p1">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M24 14v20M14 24h20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Multiple Earning Actions</div>
    </div>

    <!-- Pillar 2: Top-Right -->
    <div class="pillar p2">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M24 16C20 16 17 19 17 23s3 7 7 7 7-3 7-7-3-7-7-7z" stroke="#FFFFFF" stroke-width="2"/>
          <path d="M24 20v6M21 23h6" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Brand Alignment</div>
    </div>

    <!-- Pillar 3: Right -->
    <div class="pillar p3">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M18 20h12v12H18z" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
          <path d="M22 26h4M22 30h6" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Tiered Experiences</div>
    </div>

    <!-- Pillar 4: Bottom-Right -->
    <div class="pillar p4">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <circle cx="18" cy="22" r="3.5" stroke="#FFFFFF" stroke-width="2"/>
          <circle cx="30" cy="22" r="3.5" stroke="#FFFFFF" stroke-width="2"/>
          <path d="M18 26l12 8M30 26l-12 8" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Personalization</div>
    </div>

    <!-- Pillar 5: Bottom-Left -->
    <div class="pillar p5">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M20 18h8v20h-8z" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
          <path d="M26 24h4" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Simplicity</div>
    </div>

    <!-- Pillar 6: Left -->
    <div class="pillar p6">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M14 28h20M18 24l-4 4 4 4M30 24l4 4-4 4" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M14 16h20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Omnichannel</div>
    </div>

    <!-- Pillar 7: Top-Left -->
    <div class="pillar p7">
      <div class="pillar-icon">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="10" fill="#00BCE1"/>
          <path d="M16 20h16v12H16z" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
          <path d="M20 24h8M20 28h8" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="pillar-text">Measure Health</div>
    </div>

  </div>

</body>
</html>
