<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body { width: 1526px; height: {{HEIGHT_BASE}}px; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-image: {{BACKGROUND_PNG}}; background-size: 100% 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 72px 80px; gap: 48px; overflow: hidden; }
    .headline { color: #06038D; font-size: 48px; font-weight: 700; text-align: center; max-width: 900px; }
    .steps { display: flex; align-items: center; gap: 32px; width: 100%; justify-content: center; }
    .step { flex: 0 1 300px; background: rgba(6, 3, 141, 0.72); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; padding: 36px 28px; display: flex; flex-direction: column; align-items: center; gap: 20px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
    .step-number { background: #00BCE1; color: #FFF; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; }
    .step-title { color: #FFFFFF; font-size: 26px; font-weight: 600; line-height: 1.3; }
  </style>
</head>
<body>
  <div class="headline">3 Technical Building Blocks</div>
  <div class="steps">
    <div class="step">
      <div class="step-number">1</div>
      <div class="step-title">Unified Customer Profiles</div>
    </div>
    <div style="color: #00BCE1; font-size: 28px; margin-bottom: 20px;">→</div>
    <div class="step">
      <div class="step-number">2</div>
      <div class="step-title">Loyalty App Connection</div>
    </div>
    <div style="color: #00BCE1; font-size: 28px; margin-bottom: 20px;">→</div>
    <div class="step">
      <div class="step-number">3</div>
      <div class="step-title">Automated Triggers</div>
    </div>
  </div>
</body>
</html>
