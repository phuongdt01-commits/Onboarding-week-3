<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { zoom: calc({{WIDTH}} / 1526); }
    body {
      width: 1526px;
      height: {{HEIGHT_BASE}}px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-image: {{BACKGROUND_PNG}};
      background-size: 100% 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 80px;
      gap: 36px;
      overflow: hidden;
    }
    h1 { color: #06038D; font-size: 48px; font-weight: 700; text-align: center; width: 100%; margin-bottom: 12px; }
    .flow { display: flex; align-items: center; gap: 0; width: 100%; }
    .step { flex: 1; background: rgba(6, 3, 141, 0.72); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px; padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
    .step.final { background: rgba(255, 109, 106, 0.82); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 24px rgba(255, 109, 106, 0.2); }
    .step-icon { width: 48px; height: 48px; }
    .step-number { background: #00BCE1; color: #FFF; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
    .step.final .step-number { background: #FFF; color: #FF6D6A; }
    .step-label { color: #FFFFFF; font-size: 22px; font-weight: 600; line-height: 1.3; }
    .arrow { width: 40px; height: 24px; flex-shrink: 0; }
    .bottom-label { color: #00BCE1; font-size: 20px; font-weight: 500; text-align: center; }
  </style>
</head>
<body>
  <h1>Tier Progression: Status Unlocks Benefits</h1>

  <div class="flow">
    <div class="step">
      <svg class="step-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="14" fill="#00BCE1"/>
        <path d="M16 28c0-4 3-6 8-6s8 2 8 6v4H16v-4z" fill="#FFF"/>
        <circle cx="24" cy="14" r="4" fill="#FFF"/>
      </svg>
      <div class="step-number">1</div>
      <div class="step-label">Member</div>
    </div>

    <svg class="arrow" viewBox="0 0 40 24" fill="none">
      <path d="M0 12h32" stroke="#00BCE1" stroke-width="3" stroke-linecap="round"/>
      <path d="M28 6l6 6-6 6" stroke="#00BCE1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="step">
      <svg class="step-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="14" fill="#00BCE1"/>
        <circle cx="24" cy="24" r="10" fill="none" stroke="#FFF" stroke-width="2"/>
        <path d="M20 24h8M24 20v8" stroke="#FFF" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="step-number">2</div>
      <div class="step-label">Gold</div>
    </div>

    <svg class="arrow" viewBox="0 0 40 24" fill="none">
      <path d="M0 12h32" stroke="#00BCE1" stroke-width="3" stroke-linecap="round"/>
      <path d="M28 6l6 6-6 6" stroke="#00BCE1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="step final">
      <svg class="step-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="14" fill="#FFF"/>
        <path d="M16 24c0-6 4-9 8-9s8 3 8 9v6H16v-6z" fill="#FF6D6A"/>
        <circle cx="24" cy="12" r="5" fill="#FF6D6A"/>
      </svg>
      <div class="step-number">3</div>
      <div class="step-label">Platinum</div>
    </div>
  </div>

  <div class="bottom-label">Unlocks exclusive perks at each tier level</div>
</body>
</html>
