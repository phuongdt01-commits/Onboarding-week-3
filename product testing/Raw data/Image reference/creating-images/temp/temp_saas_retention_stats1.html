<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    {{FONT_CLASH_DISPLAY}}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 1000px;
      font-family: 'Clash Display', sans-serif;
      background-image: url('{{BACKGROUND_BASE64}}');
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      gap: 48px;
    }

    .heading {
      color: #FFFFFF;
      font-size: 52px;
      font-weight: 600;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .cards {
      display: flex;
      gap: 32px;
      align-items: stretch;
      width: 100%;
    }

    .card {
      background: #FBC80B;
      border-radius: 24px;
      flex: 1;
      padding: 44px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .card-icon {
      width: 56px;
      height: 56px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-icon svg {
      width: 30px;
      height: 30px;
      fill: #FBC80B;
    }

    .stat-number {
      font-size: 80px;
      font-weight: 700;
      color: #000000;
      line-height: 1;
    }

    .stat-label {
      font-size: 26px;
      font-weight: 500;
      color: #000000;
      line-height: 1.3;
    }

    .source {
      font-size: 18px;
      font-weight: 400;
      color: rgba(0,0,0,0.55);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="heading">Why customer retention matters</div>

  <div class="cards">
    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
      </div>
      <div class="stat-number">25–95%</div>
      <div class="stat-label">revenue increase from just a 5% boost in retention</div>
      <div class="source">Bain &amp; Company</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
      </div>
      <div class="stat-number">1.5–3x</div>
      <div class="stat-label">faster growth for SaaS companies with 85%+ retention</div>
      <div class="source">ChartMogul</div>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div class="stat-number">5x</div>
      <div class="stat-label">more costly to acquire a new customer than retain one</div>
      <div class="source">ChurnZero</div>
    </div>
  </div>
</body>
</html>
