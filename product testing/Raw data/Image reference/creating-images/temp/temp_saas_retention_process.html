<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    {{FONT_CLASH_DISPLAY}}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 1000px;
      font-family: 'Clash Display', sans-serif;
      background-image: url('{{BACKGROUND_BASE64}}');
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 80px;
      gap: 36px;
    }

    .heading {
      color: #FFFFFF;
      font-size: 50px;
      font-weight: 600;
      text-align: center;
    }

    .formula-box {
      background: #FBC80B;
      border-radius: 20px;
      padding: 28px 48px;
      text-align: center;
      width: 100%;
    }

    .formula-label {
      font-size: 22px;
      font-weight: 500;
      color: rgba(0,0,0,0.6);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .formula-text {
      font-size: 32px;
      font-weight: 700;
      color: #000;
      line-height: 1.3;
    }

    .steps {
      display: flex;
      align-items: center;
      gap: 0;
      width: 100%;
    }

    .step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .step-badge {
      background: #FBC80B;
      border-radius: 16px;
      padding: 16px 24px;
      min-width: 180px;
    }

    .step-value {
      font-size: 42px;
      font-weight: 700;
      color: #000;
      line-height: 1;
    }

    .step-desc {
      font-size: 19px;
      font-weight: 500;
      color: rgba(0,0,0,0.65);
      margin-top: 4px;
    }

    .step-label {
      font-size: 20px;
      font-weight: 500;
      color: #FFFFFF;
      opacity: 0.85;
    }

    .arrow {
      color: #FBC80B;
      font-size: 44px;
      font-weight: 300;
      flex-shrink: 0;
      padding: 0 8px;
      margin-top: -28px;
    }

    .result-box {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 28px 56px;
      display: flex;
      align-items: center;
      gap: 48px;
      width: 100%;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      justify-content: center;
    }

    .result-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #16a34a; }
    .dot-red { background: #dc2626; }

    .result-number {
      font-size: 52px;
      font-weight: 700;
    }

    .result-green { color: #16a34a; }
    .result-red { color: #dc2626; }

    .result-text {
      font-size: 22px;
      font-weight: 500;
      color: #333;
    }

    .divider {
      width: 2px;
      height: 60px;
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="heading">How to calculate customer retention rate</div>

  <div class="formula-box">
    <div class="formula-label">CRR Formula</div>
    <div class="formula-text">CRR = ((Customers at end &minus; New customers) &divide; Customers at start) &times; 100</div>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-badge">
        <div class="step-value">200</div>
        <div class="step-desc">customers</div>
      </div>
      <div class="step-label">Start of quarter</div>
    </div>
    <div class="arrow">&#8594;</div>
    <div class="step">
      <div class="step-badge">
        <div class="step-value">+30</div>
        <div class="step-desc">new customers</div>
      </div>
      <div class="step-label">Acquired</div>
    </div>
    <div class="arrow">&#8594;</div>
    <div class="step">
      <div class="step-badge">
        <div class="step-value">210</div>
        <div class="step-desc">customers</div>
      </div>
      <div class="step-label">End of quarter</div>
    </div>
    <div class="arrow">&#8594;</div>
    <div class="step">
      <div class="step-badge" style="background:#000; color:#FBC80B;">
        <div class="step-value" style="color:#FBC80B;">CRR</div>
        <div class="step-desc" style="color:rgba(251,200,11,0.7);">((210-30)/200)×100</div>
      </div>
      <div class="step-label">Calculation</div>
    </div>
  </div>

  <div class="result-box">
    <div class="result-item">
      <div class="result-dot dot-green"></div>
      <div class="result-number result-green">90%</div>
      <div class="result-text">retained</div>
    </div>
    <div class="divider"></div>
    <div class="result-item">
      <div class="result-dot dot-red"></div>
      <div class="result-number result-red">10%</div>
      <div class="result-text">churned</div>
    </div>
  </div>
</body>
</html>
