<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    {{FONT_CLASH_DISPLAY}}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 1000px;
      font-family: 'Clash Display', sans-serif;
      background-image: url('{{BACKGROUND_BASE64}}');
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 45px 50px;
    }

    h1 {
      color: #FFFFFF;
      font-size: 48px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 35px;
    }

    .elements {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      width: 100%;
    }

    .element {
      background: #FBC80B;
      border-radius: 100px;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .number {
      background: #000000;
      color: #FFFFFF;
      min-width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .text {
      color: #000000;
      font-size: 26px;
      font-weight: 500;
    }

    .rows-container {
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: center;
    }

    .row-top {
      display: flex;
      gap: 28px;
      justify-content: center;
    }

    .row-mid {
      display: flex;
      gap: 28px;
      justify-content: center;
    }

    .row-bottom {
      display: flex;
      gap: 28px;
      justify-content: center;
    }

    .center-box {
      background: rgba(255, 255, 255, 0.15);
      border: 3px solid #FBC80B;
      border-radius: 20px;
      padding: 25px 40px;
      margin-top: 30px;
      text-align: center;
    }

    .center-text {
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h1>7 core elements of effective CS operations</h1>

  <div class="rows-container">
    <div class="row-top">
      <div class="element">
        <span class="number">1</span>
        <span class="text">Ticket Lifecycle Clarity</span>
      </div>
      <div class="element">
        <span class="number">2</span>
        <span class="text">Routing Logic</span>
      </div>
      <div class="element">
        <span class="number">3</span>
        <span class="text">Quality Governance</span>
      </div>
    </div>

    <div class="row-mid">
      <div class="element">
        <span class="number">4</span>
        <span class="text">Automation</span>
      </div>
      <div class="element">
        <span class="number">5</span>
        <span class="text">Knowledge Management</span>
      </div>
    </div>

    <div class="row-bottom">
      <div class="element">
        <span class="number">6</span>
        <span class="text">Workforce Planning</span>
      </div>
      <div class="element">
        <span class="number">7</span>
        <span class="text">Insight Loops</span>
      </div>
    </div>
  </div>

  <div class="center-box">
    <div class="center-text">These elements reinforce each other. Weakness in one creates pressure on the others.</div>
  </div>
</body>
</html>
