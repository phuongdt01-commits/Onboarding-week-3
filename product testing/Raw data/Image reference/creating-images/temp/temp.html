<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    {{FONT_CLASH_DISPLAY}}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1500px;
      height: 1000px;
      font-family: 'Clash Display', sans-serif;
      background-image: url('{{BACKGROUND_BASE64}}');
      background-size: cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 40px;
    }

    h1 {
      color: #FFFFFF;
      font-size: 48px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 40px;
    }

    .comparison {
      display: flex;
      gap: 25px;
      width: 100%;
      justify-content: center;
    }

    .industry {
      background: #FBC80B;
      border-radius: 24px;
      padding: 28px 24px;
      width: 450px;
    }

    .industry-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid rgba(0,0,0,0.15);
    }

    .industry-icon {
      width: 48px;
      height: 48px;
    }

    .industry-icon svg {
      width: 48px;
      height: 48px;
      fill: #000000;
    }

    .industry-name {
      font-size: 32px;
      font-weight: 600;
      color: #000000;
    }

    .metrics {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .metric-label {
      font-size: 18px;
      font-weight: 500;
      color: #000000;
    }

    .metric-value {
      background: #000000;
      color: #FFFFFF;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Industry benchmarks for 2026</h1>
  <div class="comparison">
    <div class="industry">
      <div class="industry-header">
        <div class="industry-icon">
          <svg viewBox="0 0 24 24"><path d="M18 6h-2c0-2.21-1.79-4-4-4S8 3.79 8 6H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-2c1.1 0 2 .9 2 2h-4c0-1.1.9-2 2-2zm6 16H6V8h2v2c0 .55.45 1 1 1s1-.45 1-1V8h4v2c0 .55.45 1 1 1s1-.45 1-1V8h2v12z"/></svg>
        </div>
        <div class="industry-name">eCommerce</div>
      </div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-label">First response</span>
          <span class="metric-value">&lt; 4h email</span>
        </div>
        <div class="metric">
          <span class="metric-label">Resolution</span>
          <span class="metric-value">&lt; 24h</span>
        </div>
        <div class="metric">
          <span class="metric-label">CSAT</span>
          <span class="metric-value">80%</span>
        </div>
        <div class="metric">
          <span class="metric-label">FCR</span>
          <span class="metric-value">70-80%</span>
        </div>
      </div>
    </div>
    <div class="industry">
      <div class="industry-header">
        <div class="industry-icon">
          <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4s1.79-4 4-4h.71C7.37 7.69 9.48 6 12 6c3.04 0 5.5 2.46 5.5 5.5v.5H19c1.66 0 3 1.34 3 3s-1.34 3-3 3z"/></svg>
        </div>
        <div class="industry-name">SaaS</div>
      </div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-label">First response</span>
          <span class="metric-value">1-4h email</span>
        </div>
        <div class="metric">
          <span class="metric-label">Resolution</span>
          <span class="metric-value">4-24h</span>
        </div>
        <div class="metric">
          <span class="metric-label">CSAT</span>
          <span class="metric-value">78-85%</span>
        </div>
        <div class="metric">
          <span class="metric-label">SLA compliance</span>
          <span class="metric-value">90%+</span>
        </div>
      </div>
    </div>
    <div class="industry">
      <div class="industry-header">
        <div class="industry-icon">
          <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
        </div>
        <div class="industry-name">Fintech</div>
      </div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-label">First response</span>
          <span class="metric-value">&lt; 1h critical</span>
        </div>
        <div class="metric">
          <span class="metric-label">Resolution</span>
          <span class="metric-value">24-72h</span>
        </div>
        <div class="metric">
          <span class="metric-label">CSAT</span>
          <span class="metric-value">78-80%</span>
        </div>
        <div class="metric">
          <span class="metric-label">Escalation rate</span>
          <span class="metric-value">&lt; 15%</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
