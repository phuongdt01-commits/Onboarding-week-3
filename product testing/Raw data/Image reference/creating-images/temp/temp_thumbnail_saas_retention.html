<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    {{FONT_CLASH_DISPLAY}}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1474px;
      height: 907px;
      font-family: 'Clash Display', sans-serif;
      background-image: url('{{BACKGROUND_THUMBNAIL_BASE64}}');
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
    }

    .text-block {
      position: absolute;
      bottom: 80px;
      left: 80px;
      max-width: 900px;
    }

    .title {
      color: #FFFFFF;
      font-size: 90px;
      font-weight: 700;
      line-height: 1.05;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .title-line2 {
      color: #FFFFFF;
      font-size: 90px;
      font-weight: 700;
      line-height: 1.05;
    }

    .subtitle {
      color: #FFFFFF;
      font-size: 44px;
      font-weight: 400;
      line-height: 1.2;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 14px;
      opacity: 0.9;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      opacity: 0.85;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="text-block">
    <div class="title">
      SaaS customer
      <span class="icon">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="white">
          <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
        </svg>
      </span>
    </div>
    <div class="title-line2">retention</div>
    <div class="subtitle">
      <span class="icon">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
      </span>
      strategies, metrics &amp; best practices
    </div>
  </div>
</body>
</html>
